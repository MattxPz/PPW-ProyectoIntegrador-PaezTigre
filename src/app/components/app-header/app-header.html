<header class="max-lg:collapse bg-slate-900 text-white shadow-md w-full z-50 fixed top-0 left-0">

  <input
    id="navbar-toggle"
    class="peer hidden"
    type="checkbox"
  />

  <label
    for="navbar-toggle"
    class="fixed inset-0 hidden max-lg:peer-checked:block"
  ></label>

  <div class="collapse-title navbar px-4">

    <div class="navbar-start">
      <label
        for="navbar-toggle"
        class="btn btn-ghost lg:hidden"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h8m-8 6h16"
          />
        </svg>
      </label>

      <a
        class="btn btn-ghost text-xl font-bold tracking-tight"
        routerLink="/"
      >
        {{ brand() | uppercase }}
      </a>
    </div>

    <div class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal px-1 font-medium">
        <li>
          <a
            routerLink="/"
            routerLinkActive="menu-active text-brand-400"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Inicio
          </a>
        </li>
        <li>
          <a
            routerLink="/projects"
            routerLinkActive="menu-active text-brand-400"
          >
            Proyectos
          </a>
        </li>
        <li>
          <a
            routerLink="/requests"
            routerLinkActive="menu-active text-brand-400"
          >
            Solicitudes
          </a>
        </li>
      </ul>
    </div>

    <div class="navbar-end hidden lg:flex items-center gap-4">
      @if (authService.currentUser$ | async; as user) {
        <span class="text-sm font-medium">{{ user.email }}</span>
        <button class="btn btn-ghost btn-sm text-error" (click)="logout()">Salir</button>
      } @else {
        <a 
          routerLink="/login" 
          routerLinkActive="btn-active"
          class="btn btn-primary border-none bg-brand-600 hover:bg-brand-500 text-white"
        >
          Cuenta
        </a>
      }
    </div>
  </div>

  <div class="collapse-content lg:hidden z-10 relative">
    <ul class="menu rounded-box bg-slate-800 p-2 font-medium shadow-lg text-white">
      <li>
        <a
          routerLink="/"
          routerLinkActive="bg-slate-700"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Inicio
        </a>
      </li>
      <li>
        <a
          routerLink="/projects"
          routerLinkActive="bg-slate-700"
        >
          Proyectos
        </a>
      </li>
      <li>
        <a
          routerLink="/requests"
          routerLinkActive="bg-slate-700"
        >
          Solicitudes
        </a>
      </li>

      <li class="mt-2 border-t border-slate-700 pt-2">
        @if (authService.currentUser$ | async; as user) {
          <span class="font-bold text-slate-300 px-4">{{ user.email }}</span>
          <a (click)="logout()" class="font-bold text-red-400 mt-1">Salir</a>
        } @else {
          <a
            routerLink="/login"
            routerLinkActive="bg-slate-700"
            class="font-bold text-brand-400"
          >
            Cuenta
          </a>
        }
      </li>
    </ul>
  </div>
</header>
